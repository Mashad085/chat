<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111b21;--bg2:#202c33;--bg3:#2a3942;--bgchat:#0b141a;
  --bout:#005c4b;--bin:#202c33;--acc:#00a884;--accl:#00cf9d;
  --tp:#e9edef;--ts:#8696a0;--tm:#667781;--brd:rgba(255,255,255,0.06);
  --icon:#aebac1;--inp:#2a3942;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#000;height:100vh;overflow:hidden;color:var(--tp)}

/* AUTH */
.auth-overlay{position:fixed;inset:0;background:var(--bgchat);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-card{background:var(--bg2);border-radius:20px;padding:48px 40px;width:400px;border:1px solid var(--brd);box-shadow:0 24px 80px rgba(0,0,0,.6);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{display:flex;justify-content:center;margin-bottom:24px}
.auth-tabs{display:flex;gap:0;margin-bottom:28px;background:var(--bg3);border-radius:10px;padding:4px}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:var(--ts);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s}
.auth-tab.active{background:var(--acc);color:#fff}
.auth-card h2{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.auth-card p{font-size:14px;color:var(--tm);text-align:center;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ts);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.field input{width:100%;background:var(--inp);border:1px solid transparent;border-radius:10px;padding:12px 14px;font-size:15px;color:var(--tp);font-family:inherit;outline:none;caret-color:var(--acc);transition:border-color .2s}
.field input:focus{border-color:var(--acc)}
.field input::placeholder{color:var(--tm)}
.auth-btn{width:100%;background:var(--acc);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px}
.auth-btn:hover{background:var(--accl);transform:translateY(-1px)}
.auth-error{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:12px;display:none}
.auth-hint{text-align:center;font-size:12px;color:var(--tm);margin-top:14px;padding:10px;background:rgba(0,168,132,.08);border-radius:8px}

/* APP */
.app{display:flex;height:100vh;background:var(--bg);overflow:hidden}

/* SIDEBAR */
.sidebar{width:370px;min-width:280px;display:flex;flex-direction:column;background:var(--bg2);border-right:1px solid var(--brd);flex-shrink:0}
.sidebar-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:60px}
.my-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;cursor:pointer}
.hdr-icons{display:flex;gap:2px}
.ibtn{width:38px;height:38px;border-radius:50%;background:none;border:none;color:var(--icon);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.ibtn:hover{background:var(--bg3);color:var(--tp)}
.ibtn svg{width:20px;height:20px}
.srch{padding:6px 12px 8px}
.srch-w{display:flex;align-items:center;background:var(--inp);border-radius:8px;padding:0 12px;gap:10px;height:38px}
.srch-w input{background:none;border:none;outline:none;color:var(--tp);font-family:inherit;font-size:14px;width:100%;caret-color:var(--acc)}
.srch-w input::placeholder{color:var(--tm)}
.ftabs{display:flex;gap:5px;padding:2px 12px 8px;overflow-x:auto}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:4px 13px;border-radius:20px;background:var(--inp);color:var(--ts);font-size:12.5px;font-weight:500;border:none;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.ftab.active{background:rgba(0,168,132,.15);color:var(--acc)}
.ftab:hover:not(.active){background:var(--bg3);color:var(--tp)}
.clist{flex:1;overflow-y:auto}
.clist::-webkit-scrollbar{width:4px}
.clist::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.ci{display:flex;align-items:center;padding:10px 16px;gap:12px;cursor:pointer;transition:background .12s;position:relative}
.ci:hover{background:rgba(255,255,255,.04)}
.ci.active{background:var(--bg3)}
.ci+.ci::before{content:'';position:absolute;top:0;left:70px;right:0;height:1px;background:var(--brd)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.av.online::after{content:'';position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--acc);border-radius:50%;border:2px solid var(--bg2)}
.cinfo{flex:1;min-width:0}
.ctop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.cname{font-size:15.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.ctime{font-size:12px;color:var(--tm);flex-shrink:0}
.ctime.new{color:var(--acc)}
.cbot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.cprev{font-size:13px;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.badge{background:var(--acc);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}

/* MAIN */
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--bgchat);overflow:hidden;position:relative}
.chat-bg{position:absolute;inset:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:14px;position:relative;z-index:1}
.welcome h2{font-size:26px;font-weight:300;color:var(--tp)}
.welcome p{font-size:14px;color:var(--tm);max-width:300px;line-height:1.6}
.welcome-badge{background:rgba(0,168,132,.12);border:1px solid rgba(0,168,132,.3);color:var(--acc);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500}
.chat-hdr{display:flex;align-items:center;padding:10px 16px;height:60px;gap:14px;background:var(--bg2);border-bottom:1px solid var(--brd);z-index:5;position:relative;flex-shrink:0}
.hdr-info{flex:1;cursor:pointer}
.hdr-name{font-size:16px;font-weight:600}
.hdr-status{font-size:12.5px;color:var(--acc)}
.msgs{flex:1;overflow-y:auto;padding:16px 8%;display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.datediv{text-align:center;margin:12px 0 8px}
.datediv span{background:var(--bg2);color:var(--ts);font-size:12px;font-weight:500;padding:4px 12px;border-radius:8px;border:1px solid var(--brd)}
.mrow{display:flex;margin:1px 0}
.mrow.out{justify-content:flex-end}
.mrow.in{justify-content:flex-start}
.bubble{max-width:65%;padding:8px 12px 6px;border-radius:10px;position:relative;animation:popIn .18s ease-out}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble.out{background:var(--bout);border-radius:10px 10px 2px 10px}
.bubble.in{background:var(--bin);border-radius:10px 10px 10px 2px}
.bubble.flagged{outline:2px solid rgba(220,38,38,.4)}
.bsender{font-size:12px;font-weight:600;margin-bottom:2px}
.btext{font-size:14.5px;line-height:1.5;color:var(--tp);word-break:break-word}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px}
.btime{font-size:11px;color:rgba(255,255,255,.4)}
.typing-ind{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--tm);flex-shrink:0;min-height:34px}
.typing-dots{display:flex;gap:4px;align-items:center}
.typing-dots span{width:7px;height:7px;background:var(--tm);border-radius:50%;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.emoji-pick{position:absolute;bottom:70px;left:16px;background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:12px;display:none;flex-wrap:wrap;gap:4px;width:290px;z-index:200;box-shadow:0 10px 40px rgba(0,0,0,.5);animation:slideUp .2s ease}
.emoji-pick.show{display:flex}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.emoji-pick span{font-size:22px;cursor:pointer;padding:5px;border-radius:6px;transition:background .1s;line-height:1}
.emoji-pick span:hover{background:var(--bg3)}
.inp-area{display:flex;align-items:center;padding:10px 16px;gap:8px;background:var(--bg2);border-top:1px solid var(--brd);position:relative;z-index:5;flex-shrink:0}
.msg-inp-w{flex:1;background:var(--inp);border-radius:10px;padding:8px 14px;display:flex;align-items:center}
.msg-inp{background:none;border:none;outline:none;color:var(--tp);font-family:inherit;font-size:15px;width:100%;resize:none;caret-color:var(--acc);line-height:1.5;max-height:120px}
.msg-inp::placeholder{color:var(--tm)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 2px 12px rgba(0,168,132,.35)}
.send-btn:hover{background:var(--accl);transform:scale(1.06)}
.send-btn svg{width:20px;height:20px;margin-left:2px}

/* BROADCAST TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--acc);color:var(--tp);padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;transition:transform .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:400px;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

*{scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="26" fill="#00a884"/>
        <path d="M26 10C17 10 10 17 10 26c0 2.7.7 5.2 1.9 7.4L10 42l8.8-2.3A15.9 15.9 0 0026 42c9 0 16-7 16-16s-7-16-16-16z" fill="white"/>
      </svg>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab" id="tabReg" onclick="switchTab('register')">Daftar</button>
    </div>
    <div id="authError" class="auth-error"></div>
    <div class="field"><label>Username</label><input type="text" id="authUser" placeholder="Username kamu..." maxlength="30"></div>
    <div class="field"><label>Password</label><input type="password" id="authPass" placeholder="Password..." onkeydown="if(event.key==='Enter')doAuth()"></div>
    <button class="auth-btn" onclick="doAuth()" id="authBtn">Masuk</button>
    <div class="auth-hint">👤 Admin: <b>admin</b> / <b>admin123</b></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-hdr">
      <div class="my-av" id="myAv">G</div>
      <div class="hdr-icons">
        <button class="ibtn" title="Admin Panel" id="adminBtn" style="display:none" onclick="window.open('/admin','_blank')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </button>
        <button class="ibtn" title="Logout" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
    <div class="srch"><div class="srch-w">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="srchInp" placeholder="Cari chat..." oninput="filterChats(this.value)">
    </div></div>
    <div class="ftabs">
      <button class="ftab active" data-tab="all" onclick="setTab(this)">Semua</button>
      <button class="ftab" data-tab="unread" onclick="setTab(this)">Belum Dibaca</button>
      <button class="ftab" data-tab="group" onclick="setTab(this)">Grup</button>
    </div>
    <div class="clist" id="clist"></div>
  </aside>

  <main class="chat-main">
    <div class="chat-bg"></div>
    <div class="welcome" id="welcome">
      <svg width="100" height="100" viewBox="0 0 100 100" fill="none" style="opacity:.6">
        <circle cx="50" cy="50" r="50" fill="rgba(0,168,132,.1)"/>
        <path d="M50 22C35 22 23 34 23 49c0 4.7.9 9 2.6 12.9L22 78l10.2-2.6A27.5 27.5 0 0050 78c15 0 27-12 27-28S65 22 50 22z" fill="rgba(0,168,132,.3)" stroke="rgba(0,168,132,.7)" stroke-width="1.5"/>
      </svg>
      <h2>ChatApp Web</h2>
      <p>Pesan terenkripsi, aman, real-time</p>
      <div class="welcome-badge" id="connBadge">⚡ Menghubungkan...</div>
    </div>
    <div id="chatView" style="display:none;flex-direction:column;height:100%;overflow:hidden">
      <div class="chat-hdr">
        <div class="av" id="hdrAv" style="width:40px;height:40px;font-size:16px;flex-shrink:0"></div>
        <div class="hdr-info">
          <div class="hdr-name" id="hdrName"></div>
          <div class="hdr-status" id="hdrStatus"></div>
        </div>
        <div class="hdr-icons">
          <button class="ibtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
          <button class="ibtn"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
        </div>
      </div>
      <div class="msgs" id="msgsArea"></div>
      <div class="typing-ind" id="typingInd" style="display:none">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typingName">mengetik...</span>
      </div>
      <div class="emoji-pick" id="emojiPick"></div>
      <div class="inp-area">
        <button class="ibtn" onclick="toggleEmoji()" style="color:var(--icon)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
        <button class="ibtn" style="color:var(--icon)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <div class="msg-inp-w">
          <textarea id="msgInp" class="msg-inp" placeholder="Ketik pesan" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const EMOJIS='😀😂😍🥰😎🤔😴😭😡🤩👍👎❤️🔥✨🎉😅🙏👏💪🫡😏🥳🤣💯🚀🌟😇🤗🫶'.split('');
let socket,token,myUser,activeRoomId,rooms=[],messages={},tab='all';

// AUTH
let authMode='login';
function switchTab(m){
  authMode=m;
  document.getElementById('tabLogin').classList.toggle('active',m==='login');
  document.getElementById('tabReg').classList.toggle('active',m==='register');
  document.getElementById('authBtn').textContent=m==='login'?'Masuk':'Daftar';
  document.getElementById('authError').style.display='none';
}

async function doAuth(){
  const u=document.getElementById('authUser').value.trim();
  const p=document.getElementById('authPass').value;
  const errEl=document.getElementById('authError');
  if(!u||!p){showAuthErr('Isi semua field');return}
  const btn=document.getElementById('authBtn');
  btn.textContent='...'; btn.disabled=true;
  try{
    const r=await fetch('/api/auth/'+authMode,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok){showAuthErr(d.error||'Error');btn.textContent=authMode==='login'?'Masuk':'Daftar';btn.disabled=false;return}
    token=d.token; myUser=d.user;
    localStorage.setItem('chattoken',token);
    document.getElementById('authOverlay').style.display='none';
    document.getElementById('app').style.display='flex';
    initApp();
  }catch(e){showAuthErr('Gagal terhubung ke server');}
  btn.textContent=authMode==='login'?'Masuk':'Daftar';btn.disabled=false;
}

function showAuthErr(msg){
  const el=document.getElementById('authError');
  el.textContent=msg; el.style.display='block';
}

async function logout(){
  try{await fetch('/api/auth/logout',{method:'POST',headers:{Authorization:'Bearer '+token}});}catch(e){}
  localStorage.removeItem('chattoken');
  location.reload();
}

// AUTO LOGIN
window.addEventListener('load',async()=>{
  const t=localStorage.getItem('chattoken');
  if(!t)return;
  try{
    const r=await fetch('/api/auth/me',{headers:{Authorization:'Bearer '+t}});
    if(r.ok){const d=await r.json();token=t;myUser=d;
      document.getElementById('authOverlay').style.display='none';
      document.getElementById('app').style.display='flex';
      initApp();
    }
  }catch(e){}
});

// INIT
function initApp(){
  const av=document.getElementById('myAv');
  av.textContent=myUser.username[0].toUpperCase();
  av.style.background=myUser.color||'#00a884';
  if(myUser.role==='admin')document.getElementById('adminBtn').style.display='flex';
  initEmoji(); connectSocket();
}

// SOCKET
function connectSocket(){
  socket=io({auth:{token}});
  socket.on('connect',()=>{
    document.getElementById('connBadge').textContent='🔌 Terhubung via Socket.IO';
    socket.emit('get_rooms');
  });
  socket.on('rooms',list=>{rooms=list;renderList()});
  socket.on('room_messages',({roomId,messages:msgs})=>{
    messages[roomId]=msgs;
    if(roomId===activeRoomId)renderMsgs();
  });
  socket.on('new_message',msg=>{
    if(!messages[msg.roomId])messages[msg.roomId]=[];
    if(!messages[msg.roomId].find(m=>m.id===msg.id))messages[msg.roomId].push(msg);
    if(msg.roomId===activeRoomId){appendMsg(msg);scrollBot();}
    else if(msg.senderId!==myUser.id){
      const r=rooms.find(x=>x.id===msg.roomId);
      if(r){r.unread=(r.unread||0)+1;r.lastMsg=msg.text;r.lastTime=msg.time;renderList();}
    }
    const r=rooms.find(x=>x.id===msg.roomId);
    if(r){r.lastMsg=msg.text;r.lastTime=msg.time;renderList();}
  });
  socket.on('typing',({roomId,name})=>{
    if(roomId!==activeRoomId)return;
    document.getElementById('typingName').textContent=name+' mengetik...';
    document.getElementById('typingInd').style.display='flex';
  });
  socket.on('stop_typing',({roomId})=>{
    if(roomId===activeRoomId)document.getElementById('typingInd').style.display='none';
  });
  socket.on('message_deleted',({msgId})=>{
    Object.values(messages).forEach(arr=>arr.forEach(m=>{if(m.id===msgId)m.deleted=true}));
    document.querySelectorAll(`[data-id="${msgId}"]`).forEach(el=>{
      el.querySelector('.btext').textContent='[Pesan dihapus]';
      el.querySelector('.btext').style.opacity='.5';
    });
  });
  socket.on('system_broadcast',({message,from})=>showToast('📢 '+from+': '+message,5000));
  socket.on('banned',({reason})=>{showToast('🚫 Akun diblokir: '+reason,0);setTimeout(()=>location.reload(),3000)});
  socket.on('user_status',({userId,status})=>{
    const r=rooms.find(x=>x.id==='room-'+userId.replace('bot-',''));
    // just UI hint
  });
  socket.on('connect_error',e=>{
    if(e.message==='AUTH_REQUIRED'||e.message==='INVALID_TOKEN'){localStorage.removeItem('chattoken');location.reload();}
  });
}

// RENDER LIST
function renderList(filter=''){
  const q=(filter||document.getElementById('srchInp').value).toLowerCase();
  document.getElementById('clist').innerHTML='';
  rooms.filter(r=>{
    if(q&&!r.name.toLowerCase().includes(q))return false;
    if(tab==='unread')return r.unread>0;
    if(tab==='group')return r.type==='group';
    return true;
  }).forEach(r=>{
    const init=r.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const el=document.createElement('div');
    el.className='ci'+(r.id===activeRoomId?' active':'');
    el.onclick=()=>openRoom(r.id);
    el.innerHTML=`
      <div class="av online" style="width:48px;height:48px;font-size:18px;background:${r.color||'#059669'}">${init}</div>
      <div class="cinfo">
        <div class="ctop"><span class="cname">${esc(r.name)}</span><span class="ctime${r.unread?' new':''}">${r.lastTime||''}</span></div>
        <div class="cbot"><span class="cprev">${esc((r.lastMsg||'').slice(0,50))}</span>${r.unread?`<span class="badge">${r.unread}</span>`:''}</div>
      </div>`;
    document.getElementById('clist').appendChild(el);
  });
}

// OPEN ROOM
function openRoom(roomId){
  activeRoomId=roomId;
  const r=rooms.find(x=>x.id===roomId);
  if(!r)return;
  r.unread=0;
  document.getElementById('welcome').style.display='none';
  const cv=document.getElementById('chatView');
  cv.style.display='flex';
  const init=r.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const av=document.getElementById('hdrAv');
  av.textContent=init; av.style.background=r.color||'#059669';
  document.getElementById('hdrName').textContent=r.name;
  document.getElementById('hdrStatus').textContent=r.type==='group'?'Grup chat':'sedang online';
  document.getElementById('typingInd').style.display='none';
  document.getElementById('emojiPick').classList.remove('show');
  renderList();
  if(messages[roomId])renderMsgs();
  else socket.emit('join_room',{roomId});
  document.getElementById('msgInp').focus();
}

// RENDER MESSAGES
function renderMsgs(){
  const area=document.getElementById('msgsArea');
  area.innerHTML='';
  if(!document.querySelector('.datediv')){
    const d=document.createElement('div');d.className='datediv';
    d.innerHTML='<span>Hari ini</span>';area.appendChild(d);
  }
  (messages[activeRoomId]||[]).forEach(m=>area.appendChild(buildBubble(m)));
  scrollBot();
}

function appendMsg(msg){
  const area=document.getElementById('msgsArea');
  if(!area.querySelector('.datediv')){
    const d=document.createElement('div');d.className='datediv';
    d.innerHTML='<span>Hari ini</span>';area.appendChild(d);
  }
  area.appendChild(buildBubble(msg));
}

function buildBubble(msg){
  const isOut=msg.senderId===myUser.id;
  const row=document.createElement('div');
  row.className='mrow '+(isOut?'out':'in');
  const r=rooms.find(x=>x.id===msg.roomId);
  const isGroup=r?.type==='group';
  const sender=(!isOut&&isGroup&&msg.senderName)?`<div class="bsender" style="color:${msg.senderColor||'#00a884'}">${esc(msg.senderName)}</div>`:'';
  const tick=isOut?`<span style="display:inline-flex">${tickSvg(msg.read)}</span>`:'';
  row.innerHTML=`<div class="bubble ${isOut?'out':'in'}${msg.flagged?' flagged':''}" data-id="${msg.id}">
    ${sender}<div class="btext">${msg.deleted?'<i style="opacity:.5">[Pesan dihapus]</i>':esc(msg.text)}</div>
    <div class="bmeta"><span class="btime">${msg.time}</span>${tick}</div>
  </div>`;
  return row;
}

function tickSvg(read){
  const c=read?'#00a884':'rgba(255,255,255,.4)';
  return`<svg viewBox="0 0 16 11" width="16" fill="none"><path d="M11.071.653L4.53 7.195l-2.6-2.6L.696 5.83l3.834 3.834L12.305 1.888 11.07.653zm3.234 0L7.764 7.195l-.788-.788-1.234 1.234 2.022 2.022L15.539 1.888 14.305.653z" fill="${c}"/></svg>`;
}

// SEND
function sendMsg(){
  const inp=document.getElementById('msgInp');
  const text=inp.value.trim();
  if(!text||!activeRoomId||!socket)return;
  socket.emit('send_message',{roomId:activeRoomId,text});
  inp.value=''; inp.style.height='auto'; inp.focus();
}

// EMOJI
function initEmoji(){
  const p=document.getElementById('emojiPick');
  EMOJIS.forEach(e=>{const s=document.createElement('span');s.textContent=e;s.onclick=()=>{document.getElementById('msgInp').value+=e};p.appendChild(s);});
}
function toggleEmoji(){document.getElementById('emojiPick').classList.toggle('show')}
document.addEventListener('click',e=>{if(!e.target.closest('.ibtn')&&!e.target.closest('.emoji-pick'))document.getElementById('emojiPick').classList.remove('show')});

// UTILS
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function scrollBot(){const a=document.getElementById('msgsArea');setTimeout(()=>a.scrollTo({top:a.scrollHeight,behavior:'smooth'}),30)}
function filterChats(v){renderList(v)}
function setTab(el){tab=el.dataset.tab;document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderList()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let toastTimer;
function showToast(msg,dur=3000){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  if(dur>0)toastTimer=setTimeout(()=>t.classList.remove('show'),dur);
}
</script>
</body>
</html>
