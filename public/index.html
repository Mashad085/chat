<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ChatApp</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111b21;--bg2:#202c33;--bg3:#2a3942;--bgchat:#0b141a;
  --bout:#005c4b;--bin:#202c33;--acc:#00a884;--accl:#00cf9d;
  --tp:#e9edef;--ts:#8696a0;--tm:#667781;--brd:rgba(255,255,255,0.06);
  --icon:#aebac1;--inp:#2a3942;--danger:#ef4444;--warn:#f59e0b;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:var(--tp)}
*{scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg3)}

/* ── VIEWS ── */
.view{position:fixed;inset:0;background:var(--bg);transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform;display:flex;flex-direction:column}
.view.hidden{transform:translateX(100%);pointer-events:none}
.view.slide-left{transform:translateX(-30%);pointer-events:none}

/* ── AUTH ── */
#vAuth{background:var(--bgchat);align-items:center;justify-content:center;z-index:100}
.auth-card{background:var(--bg2);border-radius:20px;padding:36px 28px;width:min(380px,92vw);border:1px solid var(--brd);box-shadow:0 24px 80px rgba(0,0,0,.6);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{display:flex;justify-content:center;margin-bottom:20px}
.auth-logo svg{filter:drop-shadow(0 4px 20px rgba(0,168,132,.4))}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:22px}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:var(--ts);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .2s}
.auth-tab.active{background:var(--acc);color:#fff}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fld input{width:100%;background:var(--inp);border:1.5px solid transparent;border-radius:10px;padding:11px 13px;font-size:15px;color:var(--tp);font-family:inherit;outline:none;caret-color:var(--acc);transition:border-color .2s}
.fld input:focus{border-color:var(--acc)}
.fld input::placeholder{color:var(--tm)}
.auth-btn{width:100%;background:var(--acc);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .15s}
.auth-btn:active{transform:scale(.98);background:var(--accl)}
.auth-err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:9px 13px;font-size:13px;color:#fca5a5;margin-bottom:12px;display:none}
.auth-hint{text-align:center;font-size:12px;color:var(--tm);margin-top:12px;padding:10px;background:rgba(0,168,132,.07);border-radius:8px}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;padding:0 4px 0 0;height:56px;background:var(--bg2);flex-shrink:0;padding-top:var(--safe-top)}
.topbar-back{width:44px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--icon);flex-shrink:0}
.topbar-back svg{width:22px;height:22px}
.topbar-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;cursor:pointer;position:relative}
.topbar-av.online::after{content:'';position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--acc);border-radius:50%;border:2px solid var(--bg2)}
.topbar-info{flex:1;padding:0 10px;cursor:pointer;overflow:hidden}
.topbar-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:12px;color:var(--acc)}
.topbar-icons{display:flex;gap:2px}
.ibtn{width:40px;height:40px;border-radius:50%;background:none;border:none;color:var(--icon);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.ibtn:active{background:rgba(255,255,255,.08)}
.ibtn svg{width:22px;height:22px}

/* ── CHAT LIST VIEW ── */
#vChats{z-index:10}
.chats-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;background:var(--bg2);flex-shrink:0;padding-top:var(--safe-top)}
.chats-hdr h1{font-size:20px;font-weight:700}
.chats-hdr-icons{display:flex;gap:4px}
.srch-wrap{padding:6px 12px 8px;background:var(--bg2)}
.srch-inner{display:flex;align-items:center;background:var(--inp);border-radius:8px;padding:0 12px;gap:8px;height:36px}
.srch-inner input{background:none;border:none;outline:none;color:var(--tp);font-family:inherit;font-size:14px;flex:1;caret-color:var(--acc)}
.srch-inner input::placeholder{color:var(--tm)}
.ftabs{display:flex;gap:4px;padding:2px 12px 8px;overflow-x:auto;background:var(--bg2)}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:4px 14px;border-radius:20px;background:var(--inp);color:var(--ts);font-size:12.5px;font-weight:500;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.ftab.active{background:rgba(0,168,132,.15);color:var(--acc)}
.clist{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;padding:10px 16px;gap:12px;cursor:pointer;transition:background .1s;position:relative;-webkit-user-select:none;user-select:none}
.ci:active{background:rgba(255,255,255,.05)}
.ci.active{background:var(--bg3)}
.ci+.ci::before{content:'';position:absolute;top:0;left:70px;right:0;height:1px;background:var(--brd)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;font-size:17px;position:relative;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av.online::after{content:'';position:absolute;bottom:1px;right:1px;width:12px;height:12px;background:var(--acc);border-radius:50%;border:2px solid var(--bg2)}
.cinfo{flex:1;min-width:0}
.ctop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.cname{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.ctime{font-size:12px;color:var(--tm);flex-shrink:0}
.ctime.new{color:var(--acc)}
.cbot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.cprev{font-size:13.5px;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ubadge{background:var(--acc);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}

/* ── CHAT VIEW ── */
#vChat{z-index:20;background:var(--bgchat)}
.chat-bg{position:absolute;inset:0;pointer-events:none;opacity:.5;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.msgs-area{flex:1;overflow-y:auto;padding:8px 4%;display:flex;flex-direction:column;gap:1px;position:relative;z-index:1}
.datediv{text-align:center;margin:8px 0 6px}
.datediv span{background:var(--bg2);color:var(--ts);font-size:12px;font-weight:500;padding:4px 12px;border-radius:8px;border:1px solid var(--brd)}
.mrow{display:flex;margin:2px 0}
.mrow.out{justify-content:flex-end}
.mrow.in{justify-content:flex-start}
.bubble{max-width:72%;padding:7px 10px 5px;border-radius:10px;position:relative;animation:popIn .16s ease-out}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.bubble.out{background:var(--bout);border-radius:10px 2px 10px 10px}
.bubble.in{background:var(--bin);border-radius:2px 10px 10px 10px}
.bsender{font-size:12px;font-weight:700;margin-bottom:2px}
.btext{font-size:14.5px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px}
.btime{font-size:11px;color:rgba(255,255,255,.4)}
/* Media in bubble */
.bmedia{border-radius:8px;overflow:hidden;margin-bottom:4px;max-width:220px}
.bmedia img{width:100%;display:block;cursor:pointer;border-radius:8px}
.bmedia video{width:100%;display:block;border-radius:8px}
.bdoc{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:4px;cursor:pointer;text-decoration:none;color:var(--tp)}
.bdoc-icon{width:36px;height:36px;border-radius:8px;background:rgba(0,168,132,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bdoc-icon svg{width:20px;height:20px;color:var(--acc)}
.bdoc-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.bdoc-size{font-size:11px;color:var(--ts);margin-top:1px}
/* Typing */
.typing-bar{min-height:28px;padding:4px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tm);flex-shrink:0;position:relative;z-index:1}
.tdots{display:flex;gap:4px;align-items:center}
.tdots span{width:7px;height:7px;background:var(--tm);border-radius:50%;animation:tdot 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
/* Input bar */
.inp-bar{display:flex;align-items:flex-end;padding:6px 8px;gap:6px;background:var(--bg2);flex-shrink:0;padding-bottom:calc(6px + var(--safe-bot))}
.attach-menu{position:absolute;bottom:70px;left:10px;background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:12px;display:none;gap:12px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .2s ease;flex-wrap:wrap;width:200px}
.attach-menu.show{display:flex}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.att-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;min-width:60px}
.att-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.att-icon svg{width:24px;height:24px}
.att-label{font-size:11px;color:var(--ts);text-align:center}
.emoji-pick{position:absolute;bottom:70px;left:10px;background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:12px;display:none;flex-wrap:wrap;gap:3px;width:280px;z-index:201;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .2s ease;max-height:200px;overflow-y:auto}
.emoji-pick.show{display:flex}
.emoji-pick span{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;line-height:1;transition:background .1s}
.emoji-pick span:active{background:var(--bg3)}
.msg-inp-w{flex:1;background:var(--inp);border-radius:22px;padding:8px 14px;display:flex;align-items:flex-end;gap:8px;min-height:44px}
.msg-inp{background:none;border:none;outline:none;color:var(--tp);font-family:inherit;font-size:15px;flex:1;resize:none;caret-color:var(--acc);line-height:1.5;max-height:100px;align-self:center}
.msg-inp::placeholder{color:var(--tm)}
.send-btn{width:46px;height:46px;border-radius:50%;background:var(--acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 2px 12px rgba(0,168,132,.35)}
.send-btn:active{transform:scale(.94)}
.send-btn svg{width:22px;height:22px;margin-left:2px}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--brd);flex-shrink:0;padding-bottom:var(--safe-bot)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;color:var(--ts);gap:3px;transition:color .15s;position:relative}
.bnav-item.active{color:var(--acc)}
.bnav-item svg{width:22px;height:22px}
.bnav-label{font-size:10.5px;font-weight:600}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--acc);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg2)}

/* ── PROFILE VIEW ── */
#vProfile{z-index:30}
.prof-header{display:flex;flex-direction:column;align-items:center;padding:24px 20px 20px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.prof-av-wrap{position:relative;margin-bottom:12px;cursor:pointer}
.prof-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:30px;color:#fff;overflow:hidden}
.prof-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.prof-av-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center}
.prof-av-edit svg{width:14px;height:14px;color:#fff}
.prof-name{font-size:18px;font-weight:700}
.prof-id{font-size:12px;color:var(--ts);font-family:monospace;margin-top:2px;cursor:pointer}
.prof-id:active{color:var(--acc)}
.prof-sections{flex:1;overflow-y:auto;padding:12px}
.prof-section{background:var(--bg2);border-radius:14px;margin-bottom:12px;overflow:hidden}
.prof-sec-title{padding:12px 16px 6px;font-size:12px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.6px}
.prof-item{display:flex;align-items:center;padding:12px 16px;gap:12px;border-bottom:1px solid var(--brd)}
.prof-item:last-child{border-bottom:none}
.prof-item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prof-item-icon svg{width:20px;height:20px}
.pi-green{background:rgba(0,168,132,.15);color:var(--acc)}
.pi-blue{background:rgba(59,130,246,.15);color:#3b82f6}
.pi-red{background:rgba(239,68,68,.15);color:var(--danger)}
.pi-yellow{background:rgba(245,158,11,.15);color:var(--warn)}
.pi-purple{background:rgba(139,92,246,.15);color:#8b5cf6}
.prof-item-content{flex:1;min-width:0}
.prof-item-label{font-size:14px;font-weight:500}
.prof-item-val{font-size:13px;color:var(--ts);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prof-item-arrow{color:var(--tm)}
.prof-item-arrow svg{width:16px;height:16px}

/* ── ADD CHAT VIEW ── */
#vAddChat{z-index:30}
.addchat-body{flex:1;overflow-y:auto;padding:16px}
.srch-result{background:var(--bg2);border-radius:14px;overflow:hidden}
.user-row{display:flex;align-items:center;padding:12px 16px;gap:12px;cursor:pointer;border-bottom:1px solid var(--brd)}
.user-row:last-child{border-bottom:none}
.user-row:active{background:rgba(255,255,255,.04)}
.user-row-info{flex:1}
.user-row-name{font-size:15px;font-weight:600}
.user-row-id{font-size:12px;color:var(--ts);font-family:monospace;margin-top:1px}
.user-row-status{font-size:12px;color:var(--acc)}

/* ── MODALS / SHEETS ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end}
.sheet-overlay.show{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:0 0 calc(16px + var(--safe-bot));width:100%;animation:sheetUp .25s ease;max-height:85vh;overflow-y:auto}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:700;padding:0 20px 12px;border-bottom:1px solid var(--brd)}
.sheet-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .1s}
.sheet-item:active{background:rgba(255,255,255,.04)}
.sheet-item svg{width:22px;height:22px;flex-shrink:0}
.sheet-item span{font-size:15px;font-weight:500}

/* ── EDIT MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.show{display:flex}
.modal-box{background:var(--bg2);border-radius:18px;padding:24px 20px;width:100%;max-width:380px;animation:fadeUp .25s ease}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-fld{margin-bottom:14px}
.modal-fld label{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.modal-fld input,.modal-fld textarea{width:100%;background:var(--inp);border:1.5px solid transparent;border-radius:10px;padding:10px 12px;font-size:14px;color:var(--tp);font-family:inherit;outline:none;caret-color:var(--acc);resize:vertical;transition:border-color .2s}
.modal-fld input:focus,.modal-fld textarea:focus{border-color:var(--acc)}
.modal-fld input::placeholder,.modal-fld textarea::placeholder{color:var(--tm)}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.mbtn{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.mbtn-acc{background:var(--acc);color:#fff}
.mbtn-acc:active{background:var(--accl)}
.mbtn-gray{background:var(--inp);color:var(--ts)}
.mbtn-red{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.mbtn-red:active{background:rgba(239,68,68,.25)}

/* ── IMAGE LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:800;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:85vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.lightbox-close svg{width:22px;height:22px}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid rgba(0,168,132,.3);color:var(--tp);padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:700;transition:transform .28s ease,opacity .28s;opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── UPLOAD PROGRESS ── */
.upload-preview{background:rgba(0,168,132,.08);border:1px solid rgba(0,168,132,.2);border-radius:10px;padding:10px 12px;margin:6px 8px;display:none;align-items:center;gap:10px;flex-shrink:0}
.upload-preview.show{display:flex}
.upload-preview-img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
.upload-preview-info{flex:1;min-width:0}
.upload-preview-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-preview-size{font-size:11px;color:var(--ts)}
.upload-preview-remove{width:28px;height:28px;border-radius:50%;background:rgba(239,68,68,.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--danger);flex-shrink:0}
.upload-preview-remove svg{width:16px;height:16px}

.color-picker-grid{display:flex;flex-wrap:wrap;gap:10px;padding:12px 0}
.cpick{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .15s}
.cpick.selected{border-color:#fff;transform:scale(1.1)}
</style>
</head>
<body>

<!-- AUTH VIEW -->
<div class="view" id="vAuth">

<script src="/socket.io/socket.io.js"></script>
<script>
// ─── STATE ──────────────────────────────────────────────
const EMOJIS = '😀😂😍🥰😎🤔😭😡🤩👍❤️🔥✨🎉😅🙏👏💪🫡😏🥳🤣💯🚀🌟😇🤗🫶👋🎵🎧⚡🛠️'.split('');
const COLORS = ['#00a884','#7c3aed','#db2777','#059669','#d97706','#1d4ed8','#dc2626','#0891b2','#65a30d','#c2410c'];

let socket, token, me = {}, rooms = [], msgs = {}, activeRoom = null, tab = 'all';
let pendingUpload = null; // { url, name, type, size }
let typingTimer = null;

// ─── VIEWS ──────────────────────────────────────────────
const views = ['vAuth','vChats','vChat','vAddChat','vProfile'];
function showView(id, fromBack = false) {
  views.forEach(v => {
    const el = document.getElementById(v);
    if (v === id) {
      el.classList.remove('hidden', 'slide-left');
    } else if (!fromBack && id === 'vChat' && v === 'vChats') {
      el.classList.add('slide-left'); el.classList.remove('hidden');
    } else {
      el.classList.add('hidden'); el.classList.remove('slide-left');
    }
  });
}
function backToChats() {
  showView('vChats', true);
  activeRoom = null;
  document.getElementById('srchInp').value = '';
  filterChats('');
}

// ─── AUTH ────────────────────────────────────────────────
let authMode = 'login';
function switchAuth(m) {
  authMode = m;
  document.getElementById('tabLogin').classList.toggle('active', m === 'login');
  document.getElementById('tabReg').classList.toggle('active', m === 'register');
  document.getElementById('authBtn').textContent = m === 'login' ? 'Masuk' : 'Daftar';
  document.getElementById('authErr').style.display = 'none';
}

async function doAuth() {
  const u = document.getElementById('authU').value.trim();
  const p = document.getElementById('authP').value;
  if (!u || !p) return showAuthErr('Isi semua field');
  const btn = document.getElementById('authBtn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const r = await fetch('/api/auth/' + authMode, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const d = await r.json();
    if (!r.ok) { showAuthErr(d.error || 'Gagal'); btn.textContent = authMode === 'login' ? 'Masuk' : 'Daftar'; btn.disabled = false; return; }
    token = d.token; me = d.user;
    localStorage.setItem('chattoken', token);
    initApp();
  } catch { showAuthErr('Tidak dapat terhubung ke server'); btn.textContent = authMode === 'login' ? 'Masuk' : 'Daftar'; btn.disabled = false; }
}

function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg; el.style.display = 'block';
}

// ─── AUTO LOGIN ──────────────────────────────────────────
window.addEventListener('load', async () => {
  const t = localStorage.getItem('chattoken');
  if (!t) return;
  try {
    const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + t } });
    if (r.ok) { me = await r.json(); token = t; initApp(); }
  } catch {}
});

async function logout() {
  try { await api('/api/auth/logout', 'POST'); } catch {}
  localStorage.removeItem('chattoken');
  location.reload();
}

// ─── INIT APP ────────────────────────────────────────────
function initApp() {
  updateProfileUI();
  if (me.role === 'admin') document.getElementById('adminBtn').style.display = 'flex';
  document.getElementById('myIdDisplay').textContent = me.id;
  initEmoji();
  connectSocket();
  showView('vChats');
  loadProfile();
}

function updateProfileUI() {
  const av = document.getElementById('profAv');
  av.style.background = me.color || '#00a884';
  av.textContent = (me.username || '?')[0].toUpperCase();
  document.getElementById('profName').textContent = me.username || '-';
  document.getElementById('profId').textContent = 'ID: ' + (me.id || '-').slice(0, 20) + '... (ketuk untuk salin)';
  document.getElementById('profNameVal').textContent = me.username || '-';
  document.getElementById('profEmailVal').textContent = me.email || 'Belum diisi';
  document.getElementById('profBioVal').textContent = me.bio || 'Belum diisi';
  document.getElementById('profColorVal').textContent = me.color || '-';
  const avEl = document.getElementById('profAv');
  avEl.style.background = me.color || '#00a884';
  avEl.innerHTML = me.avatarUrl
    ? `<img src="${me.avatarUrl}" alt="">`
    : (me.username || '?')[0].toUpperCase();
}

async function loadProfile() {
  try {
    const r = await api('/api/profile');
    me = { ...me, ...r };
    updateProfileUI();
  } catch {}
}

// ─── SOCKET ──────────────────────────────────────────────
function connectSocket() {
  socket = io({ auth: { token } });
  socket.on('connect', () => { socket.emit('get_rooms'); });
  socket.on('rooms', list => { rooms = list; renderChatList(); });
  socket.on('room_messages', ({ roomId, messages: list }) => {
    msgs[roomId] = list; if (roomId === activeRoom) renderMsgs();
  });
  socket.on('new_message', msg => {
    if (!msgs[msg.roomId]) msgs[msg.roomId] = [];
    if (!msgs[msg.roomId].find(m => m.id === msg.id)) msgs[msg.roomId].push(msg);
    if (msg.roomId === activeRoom) { appendBubble(msg); scrollBottom(); }
    else if (msg.senderId !== me.id) {
      const r = rooms.find(x => x.id === msg.roomId);
      if (r) { r.unread = (r.unread || 0) + 1; }
    }
    const r = rooms.find(x => x.id === msg.roomId);
    if (r) { r.lastMsg = msg.fileUrl ? '📎 Media' : msg.text; r.lastTime = msg.time; renderChatList(); }
  });
  socket.on('typing', ({ roomId, name }) => {
    if (roomId !== activeRoom) return;
    document.getElementById('typingName').textContent = name + ' mengetik...';
    document.getElementById('typingBar').style.display = 'flex';
  });
  socket.on('stop_typing', ({ roomId }) => {
    if (roomId === activeRoom) document.getElementById('typingBar').style.display = 'none';
  });
  socket.on('message_deleted', ({ msgId }) => {
    document.querySelectorAll(`[data-id="${msgId}"]`).forEach(el => {
      const bt = el.querySelector('.btext');
      if (bt) { bt.textContent = '[Pesan dihapus]'; bt.style.opacity = '.5'; bt.style.fontStyle = 'italic'; }
    });
  });
  socket.on('system_broadcast', ({ message, from }) => showToast('📢 ' + from + ': ' + message, 5000));
  socket.on('banned', ({ reason }) => { showToast('🚫 Akun diblokir: ' + reason, 0); setTimeout(() => location.reload(), 3000); });
  socket.on('user_status', ({ userId, status }) => {
    const r = rooms.find(x => x.id && x.id.includes(userId));
    if (r) { r.status = status; renderChatList(); }
  });
  socket.on('connect_error', e => {
    if (e.message === 'AUTH_REQUIRED' || e.message === 'INVALID_TOKEN') { localStorage.removeItem('chattoken'); location.reload(); }
  });
}

// ─── CHAT LIST ───────────────────────────────────────────
function renderChatList(filterQ = '') {
  const q = (filterQ || document.getElementById('srchInp').value).toLowerCase();
  const list = document.getElementById('clist');
  list.innerHTML = '';
  let totalUnread = 0;
  const filtered = rooms.filter(r => {
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (tab === 'unread') return r.unread > 0;
    if (tab === 'group') return r.type === 'group';
    return true;
  });
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--tm);font-size:14px">Tidak ada chat</div>';
    return;
  }
  filtered.forEach(r => {
    totalUnread += (r.unread || 0);
    const init = r.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const el = document.createElement('div');
    el.className = 'ci' + (r.id === activeRoom ? ' active' : '');
    el.onclick = () => openRoom(r.id);
    const online = r.status === 'online';
    el.innerHTML = `
      <div class="av ${online?'online':''}" style="width:50px;height:50px;background:${r.color||'#059669'}">
        ${r.avatarUrl ? `<img src="${r.avatarUrl}" alt="">` : init}
      </div>
      <div class="cinfo">
        <div class="ctop">
          <span class="cname">${esc(r.name)}</span>
          <span class="ctime${r.unread?' new':''}">${r.lastTime||''}</span>
        </div>
        <div class="cbot">
          <span class="cprev">${esc((r.lastMsg||'').slice(0,50))}</span>
          ${r.unread?`<span class="ubadge">${r.unread}</span>`:''}
        </div>
      </div>`;
    list.appendChild(el);
  });
  const badge = document.getElementById('totalUnreadBadge');
  if (totalUnread > 0) { badge.textContent = totalUnread; badge.style.display = 'flex'; }
  else badge.style.display = 'none';
}

function filterChats(q) { renderChatList(q); }
function setTab(el) {
  tab = el.dataset.tab;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); renderChatList();
}
function setNavTab(t) {
  document.querySelectorAll('.bnav-item').forEach(i => i.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// ─── OPEN ROOM ───────────────────────────────────────────
function openRoom(roomId) {
  activeRoom = roomId;
  const r = rooms.find(x => x.id === roomId);
  if (!r) return;
  r.unread = 0;
  renderChatList();

  const init = r.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const hdrAv = document.getElementById('chatHdrAv');
  hdrAv.style.background = r.color || '#059669';
  hdrAv.innerHTML = r.avatarUrl ? `<img src="${r.avatarUrl}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : init;
  hdrAv.className = 'topbar-av' + (r.status === 'online' ? ' online' : '');
  document.getElementById('chatHdrName').textContent = r.name;
  document.getElementById('chatHdrSub').textContent = r.type === 'group' ? 'Grup chat' : (r.status === 'online' ? 'online' : 'terakhir dilihat baru-baru ini');

  document.getElementById('typingBar').style.display = 'none';
  document.getElementById('emojiPick').classList.remove('show');
  document.getElementById('attachMenu').classList.remove('show');
  clearUpload();

  showView('vChat');
  if (msgs[roomId]) { renderMsgs(); }
  else { socket.emit('join_room', { roomId }); }
  document.getElementById('msgInp').focus();
}

function showChatInfo() {
  const r = rooms.find(x => x.id === activeRoom);
  if (r) showToast('💬 ' + r.name + ' — ' + (r.type === 'group' ? 'Grup' : 'Chat Pribadi'));
}

// ─── MESSAGES ────────────────────────────────────────────
function renderMsgs() {
  const area = document.getElementById('msgsArea');
  area.innerHTML = '';
  if (!msgs[activeRoom]?.length) {
    area.innerHTML = '<div style="text-align:center;padding:30px;color:var(--tm);font-size:14px">Belum ada pesan. Kirim pesan pertama! 👋</div>';
    return;
  }
  const div = document.createElement('div'); div.className = 'datediv';
  div.innerHTML = '<span>Hari ini</span>'; area.appendChild(div);
  msgs[activeRoom].forEach(m => area.appendChild(buildBubble(m)));
  scrollBottom();
}

function appendBubble(msg) {
  const area = document.getElementById('msgsArea');
  const empty = area.querySelector('[style*="Belum ada pesan"]');
  if (empty) area.innerHTML = '';
  if (!area.querySelector('.datediv')) {
    const d = document.createElement('div'); d.className = 'datediv';
    d.innerHTML = '<span>Hari ini</span>'; area.appendChild(d);
  }
  area.appendChild(buildBubble(msg));
}

function buildBubble(msg) {
  const isOut = msg.senderId === me.id;
  const r = rooms.find(x => x.id === msg.roomId);
  const isGroup = r?.type === 'group';
  const row = document.createElement('div');
  row.className = 'mrow ' + (isOut ? 'out' : 'in');

  let mediaHTML = '';
  if (msg.fileUrl) {
    if (msg.fileType === 'image') {
      mediaHTML = `<div class="bmedia"><img src="${msg.fileUrl}" alt="${esc(msg.fileName||'')}" loading="lazy" onclick="openLightbox('${msg.fileUrl}')"></div>`;
    } else if (msg.fileType === 'video') {
      mediaHTML = `<div class="bmedia"><video src="${msg.fileUrl}" controls playsinline preload="metadata" style="max-width:220px"></video></div>`;
    } else if (msg.fileType === 'audio') {
      mediaHTML = `<div style="padding:4px 0 6px"><audio src="${msg.fileUrl}" controls style="width:200px;height:36px"></audio></div>`;
    } else {
      const ext = (msg.fileName||'').split('.').pop().toUpperCase();
      mediaHTML = `<a class="bdoc" href="${msg.fileUrl}" download="${esc(msg.fileName||'file')}" target="_blank">
        <div class="bdoc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div><div class="bdoc-name">${esc(msg.fileName||'Dokumen')}</div><div class="bdoc-size">${ext} Dokumen</div></div>
      </a>`;
    }
  }

  const senderHdr = !isOut && isGroup && msg.senderName
    ? `<div class="bsender" style="color:${msg.senderColor||'#00a884'}">${esc(msg.senderName)}</div>` : '';
  const tick = isOut ? `<svg viewBox="0 0 16 11" width="14" fill="none"><path d="M11.071.653L4.53 7.195l-2.6-2.6L.696 5.83l3.834 3.834L12.305 1.888 11.07.653zm3.234 0L7.764 7.195l-.788-.788-1.234 1.234 2.022 2.022L15.539 1.888 14.305.653z" fill="${msg.read?'#53bdeb':'rgba(255,255,255,.4)'}" /></svg>` : '';

  row.innerHTML = `<div class="bubble ${isOut?'out':'in'}" data-id="${msg.id}">
    ${senderHdr}${mediaHTML}
    ${msg.text ? `<div class="btext">${esc(msg.text)}</div>` : ''}
    <div class="bmeta"><span class="btime">${msg.time}</span>${tick}</div>
  </div>`;
  return row;
}

// ─── SEND ────────────────────────────────────────────────
function sendMsg() {
  const inp = document.getElementById('msgInp');
  const text = inp.value.trim();
  if (!text && !pendingUpload) return;
  if (!activeRoom || !socket) return;

  socket.emit('send_message', {
    roomId: activeRoom,
    text: text || '',
    fileUrl:  pendingUpload?.url  || null,
    fileName: pendingUpload?.name || null,
    fileType: pendingUpload?.type || null,
  });

  inp.value = ''; inp.style.height = 'auto';
  clearUpload();
  inp.focus();
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

function onTyping() {
  if (!socket || !activeRoom) return;
  socket.emit('typing', { roomId: activeRoom });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.emit('stop_typing', { roomId: activeRoom }), 2000);
}

// ─── FILE UPLOAD ─────────────────────────────────────────
function toggleAttach() {
  document.getElementById('attachMenu').classList.toggle('show');
  document.getElementById('emojiPick').classList.remove('show');
}
function openAttach() { toggleAttach(); }
function triggerFile(accept) {
  document.getElementById('attachMenu').classList.remove('show');
  const id = accept.startsWith('image') ? 'fileImg' : 'fileDoc';
  document.getElementById(id).click();
}
function triggerCamera() {
  document.getElementById('attachMenu').classList.remove('show');
  document.getElementById('fileCamera').click();
}

async function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const MAX = 20 * 1024 * 1024;
  if (file.size > MAX) { showToast('⚠️ File maksimal 20MB'); return; }

  showToast('⏳ Mengupload...');
  try {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch('/api/upload', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: fd,
    });
    const d = await r.json();
    if (!r.ok) { showToast('❌ ' + (d.error || 'Upload gagal')); return; }

    pendingUpload = { url: d.url, name: d.name, type: d.type, size: d.size };
    showUploadPreview(d, file);
    showToast('✅ File siap dikirim');
  } catch { showToast('❌ Upload gagal'); }
}

function showUploadPreview(d, file) {
  const prev = document.getElementById('uploadPreview');
  prev.classList.add('show');
  document.getElementById('uploadPrevName').textContent = d.name;
  document.getElementById('uploadPrevSize').textContent = formatSize(d.size);
  const img = document.getElementById('uploadPrevImg');
  if (d.type === 'image' && file) {
    img.src = URL.createObjectURL(file);
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
}

function clearUpload() {
  pendingUpload = null;
  document.getElementById('uploadPreview').classList.remove('show');
  document.getElementById('uploadPrevImg').src = '';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

// ─── EMOJI ───────────────────────────────────────────────
function initEmoji() {
  const p = document.getElementById('emojiPick');
  EMOJIS.forEach(e => {
    const s = document.createElement('span'); s.textContent = e;
    s.onclick = () => { document.getElementById('msgInp').value += e; };
    p.appendChild(s);
  });
}
function toggleEmoji() {
  document.getElementById('emojiPick').classList.toggle('show');
  document.getElementById('attachMenu').classList.remove('show');
}

// ─── ADD CHAT / SEARCH USERS ─────────────────────────────
let searchTimer = null;
async function searchUsers(q) {
  clearTimeout(searchTimer);
  const res = document.getElementById('srchResults');
  if (!q.trim()) { res.innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    try {
      const d = await api('/api/users/search?q=' + encodeURIComponent(q));
      if (!d?.length) {
        res.innerHTML = '<div style="padding:24px;text-align:center;color:var(--tm);font-size:14px">User tidak ditemukan</div>';
        return;
      }
      res.innerHTML = d.map(u => `
        <div class="user-row" onclick="addFriend('${u.id}','${esc(u.username)}','${u.color||'#059669'}')">
          <div class="av" style="width:44px;height:44px;background:${u.color||'#059669'}">
            ${u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : u.username[0].toUpperCase()}
          </div>
          <div class="user-row-info">
            <div class="user-row-name">${esc(u.username)}</div>
            <div class="user-row-id">${u.id.slice(0,16)}...</div>
            ${u.status === 'online' ? '<div class="user-row-status">● Online</div>' : ''}
          </div>
          <button style="background:var(--acc);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">+ Chat</button>
        </div>`).join('');
    } catch { res.innerHTML = '<div style="padding:24px;text-align:center;color:var(--danger);font-size:14px">Gagal mencari</div>'; }
  }, 400);
}

async function addFriend(friendId, friendName, color) {
  try {
    const r = await api('/api/friends/add', 'POST', { friendId });
    if (r?.ok) {
      showToast('✅ ' + friendName + ' ditambahkan!');
      socket.emit('get_rooms');
      document.getElementById('addSrchInp').value = '';
      document.getElementById('srchResults').innerHTML = '';
      setTimeout(() => { backToChats(); }, 500);
    } else {
      showToast('ℹ️ ' + (r?.error || 'Sudah berteman'));
    }
  } catch { showToast('❌ Gagal menambahkan'); }
}

function copyMyId() {
  navigator.clipboard?.writeText(me.id).then(() => showToast('✅ ID disalin!')).catch(() => {
    const el = document.createElement('textarea');
    el.value = me.id; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    showToast('✅ ID disalin!');
  });
}

// ─── PROFILE EDIT ────────────────────────────────────────
let editField = null;
function editProfile(field) {
  editField = field;
  const titles = { name:'Nama', email:'Email', bio:'Bio', color:'Warna Avatar' };
  document.getElementById('editModalTitle').textContent = 'Edit ' + titles[field];
  const box = document.getElementById('editModalBody');
  if (field === 'color') {
    box.innerHTML = `<div class="color-picker-grid">${COLORS.map(c => `
      <div class="cpick${me.color===c?' selected':''}" style="background:${c}" data-color="${c}" onclick="pickColor('${c}')"></div>`).join('')}</div>`;
  } else if (field === 'bio') {
    box.innerHTML = `<div class="modal-fld"><textarea id="editInp" rows="3" placeholder="${titles[field]}...">${esc(me[field]||'')}</textarea></div>`;
  } else {
    const val = field === 'name' ? me.username : (me[field] || '');
    box.innerHTML = `<div class="modal-fld"><input type="${field==='email'?'email':'text'}" id="editInp" placeholder="${titles[field]}..." value="${esc(val)}"></div>`;
  }
  openModal('editModal');
}

function pickColor(c) {
  document.querySelectorAll('.cpick').forEach(el => el.classList.toggle('selected', el.dataset.color === c));
}

async function saveEdit() {
  if (editField === 'color') {
    const sel = document.querySelector('.cpick.selected');
    if (!sel) return;
    const color = sel.dataset.color;
    me.color = color;
    await api('/api/profile', 'PUT', { color });
    updateProfileUI(); closeModal('editModal');
    showToast('✅ Warna diperbarui');
    socket.emit('get_rooms');
    return;
  }
  const inp = document.getElementById('editInp');
  const val = inp.value.trim();
  if (!val) return;
  const payload = {};
  if (editField === 'name') {
    showToast('ℹ️ Username tidak bisa diubah'); closeModal('editModal'); return;
  }
  payload[editField] = val;
  me[editField] = val;
  await api('/api/profile', 'PUT', payload);
  updateProfileUI(); closeModal('editModal');
  showToast('✅ Profil diperbarui');
}

function editAvatar() { editProfile('color'); }

function editPassword() { openModal('passModal'); }
async function savePassword() {
  const oldP = document.getElementById('oldPass').value;
  const newP = document.getElementById('newPass').value;
  const conf = document.getElementById('confPass').value;
  if (!oldP || !newP || !conf) { showToast('⚠️ Isi semua field'); return; }
  if (newP !== conf) { showToast('⚠️ Konfirmasi password tidak cocok'); return; }
  if (newP.length < 6) { showToast('⚠️ Password minimal 6 karakter'); return; }
  try {
    const r = await api('/api/profile/password', 'PUT', { currentPassword: oldP, newPassword: newP });
    if (r?.relogin) { showToast('✅ Password diubah. Silakan login ulang.'); setTimeout(() => { localStorage.removeItem('chattoken'); location.reload(); }, 1500); }
    closeModal('passModal');
  } catch { showToast('❌ Gagal mengubah password'); }
}

// ─── LIGHTBOX ────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

// ─── MODALS ──────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// Close modal on overlay click
document.querySelectorAll('.modal-ov').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});

// ─── UTILS ───────────────────────────────────────────────
function scrollBottom() {
  const a = document.getElementById('msgsArea');
  setTimeout(() => a.scrollTo({ top: a.scrollHeight, behavior: 'smooth' }), 30);
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastT;
function showToast(msg, dur = 3000) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); clearTimeout(toastT);
  if (dur > 0) toastT = setTimeout(() => t.classList.remove('show'), dur);
}

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { Authorization: 'Bearer ' + token } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (r.status === 401) { localStorage.removeItem('chattoken'); location.reload(); return null; }
  return r.json();
}

// Close popups on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.ibtn') && !e.target.closest('.emoji-pick')) document.getElementById('emojiPick').classList.remove('show');
  if (!e.target.closest('.ibtn') && !e.target.closest('.attach-menu')) document.getElementById('attachMenu').classList.remove('show');
});

// Handle back button (Android)
window.addEventListener('popstate', () => {
  const chatView = document.getElementById('vChat');
  if (!chatView.classList.contains('hidden')) { backToChats(); history.pushState(null, '', location.href); }
});
history.pushState(null, '', location.href);
